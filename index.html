<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>BeatBox Studio</title>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="container">

<h1>🎵 BeatBox Studio</h1>

<p>

Play your favorite sounds instantly.

</p>

<div class="volume-box">

<label>

🔊 Volume

</label>

<input
type="range"
id="volume"
min="0"
max="1"
step="0.1"
value="1">

</div>

<div class="sound-grid">

<button class="sound-btn" data-sound="dog">🐶 Dog</button>

<button class="sound-btn" data-sound="cat">🐱 Cat</button>

<button class="sound-btn" data-sound="rain">🌧 Rain</button>

<button class="sound-btn" data-sound="ocean">🌊 Ocean</button>

<button class="sound-btn" data-sound="fire">🔥 Fire</button>

<button class="sound-btn" data-sound="bell">🔔 Bell</button>

<button class="sound-btn" data-sound="drum">🥁 Drum</button>

<button class="sound-btn" data-sound="piano">🎹 Piano</button>

<button class="sound-btn" data-sound="click">🖱 Click</button>

<button class="sound-btn" data-sound="laugh">😂 Laugh</button>

<button class="sound-btn" data-sound="car">🚗 Car</button>

<button class="sound-btn" data-sound="alarm">⏰ Alarm</button>

</div>

<button id="stopBtn">

Stop All Sounds

</button>

</div>

<script src="script.js"></script>

</body>

</html>
